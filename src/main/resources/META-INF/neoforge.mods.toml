modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "All Rights Reserved"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "aeroguard.mixins.json"

[[dependencies.aeroguard]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.aeroguard]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.aeroguard]]
modId = "sable"
type = "required"
versionRange = "[${sable_version},1.2.3)"
ordering = "AFTER"
side = "BOTH"
